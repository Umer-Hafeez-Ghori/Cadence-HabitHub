<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadence Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="logo-area">
        <div class="logo-box">CH</div>
        <h2> Cadence HabitHub</h2>
      </div>

      <!-- Human programming quotes section to fill the empty space -->
      <div class="quote-card">
        <span class="quote-icon">“</span>
        <p id="daily-quote">"First, solve the problem. Then, write the code."</p>
      </div>

      <!-- Add Habit Form -->
      <div class="form-container">
        <h3>Add New Habit</h3>
        <form id="habit-form">
          <input type="text" id="habit-name-input" placeholder="e.g., Read Books, Coding, Gym..." required maxlength="30">
          <button type="submit" class="add-btn">Add Habit</button>
        </form>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <header class="main-header">
        <h2 id="week-title">Current Week</h2>
        <div class="nav-buttons">
          <button id="prev-week-btn" class="nav-btn">&larr; Prev</button>
          <button id="today-btn" class="nav-btn active">Today</button>
          <button id="next-week-btn" class="nav-btn">Next &rarr;</button>
        </div>
      </header>

      <!-- Stats Bar -->
      <section class="stats-bar">
        <div class="stat-card">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">Total Habits</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-streaks" style="color: #f97316;">0</span>
          <span class="stat-label">Best Streak</span>
        </div>
      </section>

      <!-- Friendly Empty State -->
      <div id="empty-state" class="empty-box">
        <div class="empty-icon">🎯</div>
        <h3>No habits added yet</h3>
        <p>Start your journey by adding your first habit from the left panel!</p>
      </div>

      <!-- Habits Cards Container -->
      <div id="grid-container" class="habits-grid">
        <!-- Cards will appear here dynamically -->
      </div>
    </main>
  </div>

  <!-- NEW: Beautiful Toast Notification Container for UX appreciation -->
  <div id="toast-container" class="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
